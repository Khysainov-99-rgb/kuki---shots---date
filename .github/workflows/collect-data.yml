name: KUKI-SHOTS Auto Collector

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'      # 11:00 МСК
    - cron: '30 10 * * *'    # 13:30 МСК
    - cron: '0 16 * * *'     # 19:00 МСК
    - cron: '0 22 * * *'     # 01:00 МСК
    - cron: '30 4 * * *'     # 07:30 МСК
  workflow_dispatch:

jobs:
  collect-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml html5lib
      
      - name: Create directories
        run: |
          mkdir -p data/khl data/nhl data/nba data/analytics data/odds logs backups
      
      - name: Collect KHL data
        run: |
          python .github/scripts/collect_khl.py
      
      - name: Collect NHL data
        run: |
          python .github/scripts/collect_nhl.py
      
      - name: Collect NBA data
        run: |
          python .github/scripts/collect_nba.py
      
      - name: Collect analytics and predictions
        run: |
          python .github/scripts/collect_analytics.py
      
      - name: Update calibration
        run: |
          python .github/scripts/update_calibration.py
      
      - name: Backup data
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M')
          mkdir -p backups/$TIMESTAMP
          cp -r data/* backups/$TIMESTAMP/ 2>/dev/null || true
      
      - name: Commit local changes
        run: |
          git config --global user.name "KUKI Bot"
          git config --global user.email "kuki-bot@users.noreply.github.com"
          git add data/ logs/ recent_matches.json calibration.json
          if ! git diff --quiet && git diff --staged --quiet; then
            git commit -m "Auto-update data"
            echo "✅ Локальные изменения закоммичены"
          else
            echo "ℹ️ Нет локальных изменений для коммита"
          fi
      
      - name: Pull latest changes
        run: |
          git pull --rebase origin main || echo "ℹ️ Не удалось выполнить pull, продолжаем"
      
      - name: Push changes
        run: |
          git push || echo "ℹ️ Не удалось выполнить push, возможно нет изменений"
