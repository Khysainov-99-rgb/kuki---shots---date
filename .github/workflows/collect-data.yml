name: KUKI-SHOTS Auto Collector

on:
  schedule:
    # КХЛ: утренний сбор прогнозов (11:00 МСК)
    - cron: '0 8 * * *'
    # КХЛ: предматчевый сбор (13:30 МСК)
    - cron: '30 10 * * *'
    # НХЛ: вечерний сбор перед ночными матчами (19:00 МСК)
    - cron: '0 16 * * *'
    # НХЛ: ночной сбор перед стартом (01:00 МСК)
    - cron: '0 22 * * *'
    # Финальный сбор результатов (07:30 МСК)
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  collect-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas lxml html5lib
      
      - name: Create directories
        run: |
          mkdir -p data/khl data/nhl data/analytics data/odds logs backups
      
      - name: Collect KHL data
        run: |
          python .github/scripts/collect_khl.py
      
      - name: Collect NHL data
        run: |
          python .github/scripts/collect_nhl.py
      
      - name: Collect analytics and predictions
        run: |
          python .github/scripts/collect_analytics.py
      
      - name: Update calibration
        run: |
          python .github/scripts/update_calibration.py
      
      - name: Backup data
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M')
          mkdir -p backups/$TIMESTAMP
          cp -r data/* backups/$TIMESTAMP/ 2>/dev/null || true
          cp logs/* backups/$TIMESTAMP/ 2>/dev/null || true
      
      - name: Commit and push changes
        run: |
          git config --global user.name "KUKI Bot"
          git config --global user.email "kuki-bot@users.noreply.github.com"
          git add data/ logs/ recent_matches.json calibration.json
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          if ! git diff --quiet && git diff --staged --quiet; then
            git commit -m "Автообновление данных ${TIMESTAMP}"
            git push
          else
            echo "Нет изменений для коммита"
          fi
